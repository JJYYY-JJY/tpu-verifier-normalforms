matrix:
  family: dense
  rows: 32
  cols: 32
data:
  trace_schema: rref-backward-trace-npz-v1
  state_schema: rref-state-action-npz-v1
  format: zarr
  count: 1048576
  seed_start: 0
  max_backward_ops: 384
model:
