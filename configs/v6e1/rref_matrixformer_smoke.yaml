  require_finite_loss: true
  require_checkpoint_rollout: true
  require_explicit_failure_status: true
artifacts:
  checkpoint_dir: /tmp/nf-v6e1/checkpoints/rref_matrixformer_smoke
  report_dir: /tmp/nf-v6e1/reports/rref_matrixformer_smoke
  commit_policy: compact_reports_only
